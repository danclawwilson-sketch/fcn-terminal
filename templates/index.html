<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCN Terminal v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04080f;
            --bg2: #070d18;
            --sur: #0a1220;
            --sur2: #0d1a2e;
            --brd: #0e2040;
            --brd2: #1a3560;
            --acc: #00d9ff;
            --acc2: #00ff88;
            --bull: #00ff88;
            --bear: #ff2d55;
            --range: #ffb800;
            --txt: #e0f0ff;
            --txt2: #8a9bb0;
            --shadow: 0 0 20px rgba(0, 217, 255, 0.15);
            --glow: 0 0 30px rgba(0, 217, 255, 0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Exo 2', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--txt);
            min-height: 100vh;
            padding: 16px;
            line-height: 1.6;
        }
        
        .container { max-width: 480px; margin: 0 auto; }
        
        /* Header */
        .header {
            text-align: center;
            padding: 24px 0 16px;
        }
        
        .header-icon {
            width: 12px;
            height: 12px;
            border: 2px solid var(--acc);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--acc);
        }
        
        .header h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.3em;
            letter-spacing: 4px;
            color: var(--acc);
            font-weight: 400;
            display: inline-flex;
            align-items: center;
        }
        
        .header .subtitle {
            color: var(--txt2);
            font-size: 0.75em;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        
        /* Cards */
        .card {
            background: var(--sur);
            border: 1px solid var(--brd);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        
        .card-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--brd);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        
        .card-header h3 {
            font-size: 0.75em;
            color: var(--txt2);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }
        
        .card-body {
            padding: 16px;
        }
        
        /* LIVE Indicator */
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7em;
            color: var(--acc2);
            letter-spacing: 2px;
        }
        
        .live-dot {
            width: 6px;
            height: 6px;
            background: var(--acc2);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--acc2);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        /* Status Button */
        .status-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 600;
            border: 1px solid;
        }
        
        .status-btn.offline {
            background: rgba(255, 45, 85, 0.1);
            color: var(--bear);
            border-color: var(--bear);
        }
        
        .status-btn.online {
            background: rgba(0, 255, 136, 0.1);
            color: var(--bull);
            border-color: var(--bull);
        }
        
        /* ETH Price Bar */
        .eth-price-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--brd);
            margin-bottom: 16px;
        }
        
        .eth-label {
            font-size: 0.7em;
            color: var(--txt2);
            letter-spacing: 1px;
        }
        
        .eth-value {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.6em;
            color: var(--acc2);
            font-weight: 600;
        }
        
        /* Total Investment */
        .total-investment {
            text-align: center;
            padding: 16px 0;
            margin-bottom: 16px;
        }
        
        .total-label {
            font-size: 0.7em;
            color: var(--txt2);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .total-amount {
            font-family: 'Share Tech Mono', monospace;
            font-size: 2em;
            color: var(--acc);
            margin-top: 4px;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }
        
        /* Categories Grid */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .category-item {
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: 8px;
            padding: 12px 8px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .category-item:hover {
            border-color: var(--brd2);
            background: var(--sur2);
        }
        
        .category-item[data-category="spot"] {
            border-top: 2px solid var(--acc);
        }
        
        .category-item[data-category="fcn"] {
            border-top: 2px solid var(--bull);
        }
        
        .category-item[data-category="dci"] {
            border-top: 2px solid var(--range);
        }
        
        .cat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .cat-name {
            font-size: 0.75em;
            color: var(--txt);
            font-weight: 600;
        }
        
        .cat-percent {
            font-size: 0.65em;
            color: var(--txt2);
            background: var(--sur);
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .cat-amount {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1em;
            color: var(--acc2);
            margin-bottom: 4px;
        }
        
        .cat-detail {
            font-size: 0.65em;
            color: var(--txt2);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        /* Primary Button */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--acc), var(--acc2));
            border: none;
            border-radius: 8px;
            color: var(--bg);
            font-size: 0.85em;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .btn-primary:hover {
            box-shadow: var(--glow);
            transform: translateY(-1px);
        }
        
        .btn-primary:disabled {
            background: var(--brd);
            color: var(--txt2);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* Connection Panel */
        .conn-panel .card-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .input-row {
            display: flex;
            gap: 8px;
        }
        
        .input-row input {
            flex: 1;
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--txt);
            font-size: 0.8em;
        }
        
        .input-row input::placeholder {
            color: var(--txt2);
        }
        
        .input-row input:focus {
            outline: none;
            border-color: var(--acc);
        }
        
        .conn-status {
            font-size: 0.75em;
            color: var(--txt2);
            text-align: center;
        }
        
        /* Sync Button */
        .sync-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--brd2);
            color: var(--txt);
            border-radius: 8px;
            font-size: 0.8em;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .sync-btn:hover {
            background: var(--brd);
            border-color: var(--acc);
            color: var(--acc);
        }
        
        .sync-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Section Title */
        .section-title {
            font-size: 0.75em;
            color: var(--acc);
            letter-spacing: 2px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title::before {
            content: '//';
            color: var(--txt2);
        }
        
        /* Positions List */
        .position-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--brd);
        }
        
        .position-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        
        .position-phase {
            font-family: 'Share Tech Mono', monospace;
            color: var(--acc);
            font-size: 0.9em;
        }
        
        .position-amt {
            font-family: 'Share Tech Mono', monospace;
            color: var(--txt);
        }
        
        .position-details {
            font-size: 0.75em;
            color: var(--txt2);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 32px;
            color: var(--txt2);
            font-size: 0.85em;
        }
        
        /* Hidden */
        .hidden { display: none !important; }
        
        /* Badge */
        .badge {
            background: var(--acc);
            color: var(--bg);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 700;
        }
        
        /* Results */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        
        .result-item {
            background: var(--bg2);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .result-item .label {
            font-size: 0.65em;
            color: var(--txt2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .result-item .value {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1em;
            color: var(--acc2);
            margin-top: 4px;
        }
        
        /* Form Fields */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 0.7em;
            color: var(--txt2);
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-align: center;
        }
        
        .form-input {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: 8px;
            padding: 16px;
            color: var(--acc2);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.3em;
            text-align: center;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--acc);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.2);
        }
        
        /* History Section - New Design */
        .history-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .history-column {
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: 8px;
            padding: 12px;
        }
        
        .history-column.fcn {
            border-top: 2px solid var(--bull);
        }
        
        .history-column.dci {
            border-top: 2px solid var(--range);
        }
        
        .history-col-header {
            font-size: 0.8em;
            font-weight: 600;
            color: var(--txt);
            margin-bottom: 12px;
            text-align: center;
        }
        
        .date-select {
            width: 100%;
            background: var(--sur);
            border: 1px solid var(--brd);
            border-radius: 6px;
            padding: 8px;
            color: var(--txt);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8em;
            margin-bottom: 12px;
        }
        
        .date-select:focus {
            outline: none;
            border-color: var(--acc);
        }
        
        .history-list-compact {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .history-item-compact {
            background: var(--sur);
            border: 1px solid var(--brd);
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 8px;
            font-size: 0.75em;
        }
        
        .history-item-compact .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        
        .history-item-compact .phase {
            font-family: 'Share Tech Mono', monospace;
            color: var(--acc);
        }
        
        .history-item-compact .scenario {
            font-size: 0.8em;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        .history-item-compact .scenario.ko, .history-item-compact .scenario.a {
            background: rgba(0, 255, 136, 0.15);
            color: var(--bull);
        }
        
        .history-item-compact .scenario.s1, .history-item-compact .scenario.s2, .history-item-compact .scenario.b {
            background: rgba(255, 184, 0, 0.15);
            color: var(--range);
        }
        
        .history-item-compact .amount {
            font-family: 'Share Tech Mono', monospace;
            color: var(--txt);
        }
        
        .history-item-compact .return {
            color: var(--txt2);
            font-size: 0.85em;
        }
        
        .history-summary-compact {
            background: var(--sur);
            border: 1px solid var(--brd);
            border-radius: 6px;
            padding: 8px;
            margin-top: 8px;
            text-align: center;
            font-size: 0.75em;
        }
        
        .history-summary-compact .total {
            font-family: 'Share Tech Mono', monospace;
            color: var(--acc2);
            font-size: 1.1em;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--sur);
            border: 1px solid var(--brd);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.85em;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .toast.success {
            border-color: var(--bull);
            color: var(--bull);
        }
        
        .toast.error {
            border-color: var(--bear);
            color: var(--bear);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><span class="header-icon"></span>FCN TERMINAL V3.0</h1>
            <div class="subtitle">幣安結構性產品投資組合管理</div>
        </div>
        
        <!-- Connection Panel -->
        <div class="card conn-panel" id="connPanel">
            <div class="card-body">
                <div class="input-row">
                    <input type="text" id="apiKey" placeholder="API Key" autocomplete="off">
                </div>
                <div class="input-row">
                    <input type="password" id="secretKey" placeholder="Secret Key" autocomplete="off">
                </div>
                <button class="btn-primary" id="connectBtn" onclick="connect()">Connect</button>
                <div class="conn-status" id="connStatus">Not connected</div>
            </div>
        </div>
        
        <!-- Live Dashboard -->
        <div class="card hidden" id="dashboardCard">
            <div class="card-header">
                <div class="live-indicator">
                    <span class="live-dot"></span>
                    LIVE
                </div>
                <span class="status-btn offline" id="connStatusBtn">斷線</span>
            </div>
            <div class="card-body">
                <!-- ETH Price -->
                <div class="eth-price-bar">
                    <span class="eth-label">ETH/USDT</span>
                    <span class="eth-value" id="liveEthPrice">--</span>
                </div>
                
                <!-- Total Investment -->
                <div class="total-investment">
                    <div class="total-label">總投資金額</div>
                    <div class="total-amount" id="liveTotal">--</div>
                </div>
                
                <!-- Three Categories -->
                <div class="categories-grid">
                    <div class="category-item" data-category="spot">
                        <div class="cat-header">
                            <span class="cat-name">現貨</span>
                            <span class="cat-percent" id="spotPercent">--</span>
                        </div>
                        <div class="cat-amount" id="spotValue">--</div>
                        <div class="cat-detail">
                            <span id="spotUsdt">USDT: --</span>
                            <span id="spotEth">ETH: --</span>
                        </div>
                    </div>
                    
                    <div class="category-item" data-category="fcn">
                        <div class="cat-header">
                            <span class="cat-name">折價買幣</span>
                            <span class="cat-percent" id="fcnPercent">--</span>
                        </div>
                        <div class="cat-amount" id="fcnValue">--</div>
                        <div class="cat-detail">
                            <span id="fcnCount">-- 筆</span>
                        </div>
                    </div>
                    
                    <div class="category-item" data-category="dci">
                        <div class="cat-header">
                            <span class="cat-name">高價賣出</span>
                            <span class="cat-percent" id="dciPercent">--</span>
                        </div>
                        <div class="cat-amount" id="dciValue">--</div>
                        <div class="cat-detail">
                            <span id="dciCount">-- 筆</span>
                        </div>
                    </div>
                </div>
                
                <button class="sync-btn" onclick="syncData()" id="syncBtn">↓ SYNC</button>
            </div>
        </div>
        
        <!-- Positions -->
        <div class="card hidden" id="positionsCard">
            <div class="card-header">
                <h3>FCN 持倉 <span class="badge" id="activeCount">0</span></h3>
            </div>
            <div class="card-body" id="positionsList">
                <div class="empty-state">No active positions</div>
            </div>
        </div>
        
        <!-- Dual Investment -->
        <div class="card hidden" id="dualCard">
            <div class="card-header">
                <h3>雙幣投資 <span class="badge" id="dualCount">0</span></h3>
            </div>
            <div class="card-body" id="dualList">
                <div class="empty-state">No active positions</div>
            </div>
        </div>
        
        <!-- Settlement Control -->
        <div class="card hidden" id="settlementCard">
            <div class="card-body">
                <h3 class="section-title">結算控制</h3>
                
                <div class="form-group">
                    <label class="form-label">結算日期</label>
                    <input type="text" class="form-input" id="settleDate" readonly placeholder="--">
                </div>
                
                <div class="form-group">
                    <label class="form-label">結算價格</label>
                    <input type="number" class="form-input" id="settlePrice" placeholder="0.00" step="0.01">
                    <div style="text-align: center; font-size: 0.7em; color: var(--txt2); margin-top: 4px;">USDT</div>
                </div>
                
                <button class="btn-primary" onclick="calculateSettlement()">計算收益</button>
                
                <div id="calcResults" class="hidden">
                    <div class="results-grid" id="resultsGrid">
                        <!-- Results will be inserted here -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- History Section - Two Columns -->
        <div class="card hidden" id="historyCard">
            <div class="card-header">
                <h3>歷史持倉 (最近30天)</h3>
            </div>
            <div class="card-body">
                <div class="history-grid">
                    <!-- FCN History -->
                    <div class="history-column fcn">
                        <div class="history-col-header">折價買幣</div>
                        <select class="date-select" id="fcnHistoryDate" onchange="loadFcnHistory()">
                            <option value="">選擇結算日期</option>
                        </select>
                        <div class="history-list-compact" id="fcnHistoryList">
                            <div class="empty-state">無歷史記錄</div>
                        </div>
                        <div class="history-summary-compact" id="fcnHistorySummary"></div>
                    </div>
                    
                    <!-- DCI History -->
                    <div class="history-column dci">
                        <div class="history-col-header">高價賣出</div>
                        <select class="date-select" id="dciHistoryDate" onchange="loadDciHistory()">
                            <option value="">選擇結算日期</option>
                        </select>
                        <div class="history-list-compact" id="dciHistoryList">
                            <div class="empty-state">無歷史記錄</div>
                        </div>
                        <div class="history-summary-compact" id="dciHistorySummary"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // State
        let state = {
            connected: false,
            apiKey: '',
            secretKey: '',
            ethPrice: 0,
            spotUsdt: 0,
            spotEth: 0,
            dualTotal: 0,
            dualPositions: [],
            activePositions: [],
            settledPositions: [],
            fcnTotalValue: 0,
            fcnHistory: { dates: [], data: {} },
            dciHistory: { dates: [], data: {} }
        };
        
        // API helper
        async function apiCall(endpoint, data) {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return await res.json();
        }
        
        // Show toast
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Connect
        async function connect() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const secretKey = document.getElementById('secretKey').value.trim();
            
            if (!apiKey || !secretKey) {
                showToast('請輸入 API Key 和 Secret Key', 'error');
                return;
            }
            
            const btn = document.getElementById('connectBtn');
            btn.disabled = true;
            btn.textContent = 'Connecting...';
            
            try {
                const data = await apiCall('/api/connect', { api_key: apiKey, secret_key: secretKey });
                
                if (data.success) {
                    state.connected = true;
                    state.apiKey = apiKey;
                    state.secretKey = secretKey;
                    state.ethPrice = data.eth_price;
                    state.spotUsdt = data.spot_usdt || 0;
                    state.spotEth = data.spot_eth || 0;
                    state.dualTotal = data.dual_total || 0;
                    
                    showToast('Connected successfully');
                    
                    // Update UI
                    document.getElementById('connPanel').classList.add('hidden');
                    document.getElementById('dashboardCard').classList.remove('hidden');
                    document.getElementById('positionsCard').classList.remove('hidden');
                    document.getElementById('dualCard').classList.remove('hidden');
                    document.getElementById('settlementCard').classList.remove('hidden');
                    document.getElementById('historyCard').classList.remove('hidden');
                    
                    updateStatus(true);
                    updateDashboard();
                    await loadPositions();
                    await loadHistoryData();
                } else {
                    showToast('Connection failed: ' + (data.error || 'Unknown error'), 'error');
                    btn.disabled = false;
                    btn.textContent = 'Connect';
                }
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Connect';
            }
        }
        
        // Update connection status
        function updateStatus(connected) {
            const btn = document.getElementById('connStatusBtn');
            if (connected) {
                btn.className = 'status-btn online';
                btn.textContent = '已連接';
            } else {
                btn.className = 'status-btn offline';
                btn.textContent = '斷線';
            }
        }
        
        // Update Dashboard
        function updateDashboard() {
            const spotValue = state.spotUsdt + (state.spotEth * state.ethPrice);
            const fcnValue = state.fcnTotalValue;
            const dciValue = state.dualTotal;
            const total = spotValue + fcnValue + dciValue;
            
            document.getElementById('liveEthPrice').textContent = '$' + state.ethPrice.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('liveTotal').textContent = '$' + total.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            
            document.getElementById('spotValue').textContent = '$' + spotValue.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
            document.getElementById('spotPercent').textContent = total > 0 ? ((spotValue / total) * 100).toFixed(1) + '%' : '0%';
            document.getElementById('spotUsdt').textContent = 'USDT: ' + state.spotUsdt.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
            document.getElementById('spotEth').textContent = 'ETH: ' + state.spotEth.toFixed(4);
            
            document.getElementById('fcnValue').textContent = '$' + fcnValue.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
            document.getElementById('fcnPercent').textContent = total > 0 ? ((fcnValue / total) * 100).toFixed(1) + '%' : '0%';
            document.getElementById('fcnCount').textContent = state.activePositions.length + ' 筆';
            
            document.getElementById('dciValue').textContent = '$' + dciValue.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
            document.getElementById('dciPercent').textContent = total > 0 ? ((dciValue / total) * 100).toFixed(1) + '%' : '0%';
            document.getElementById('dciCount').textContent = state.dualPositions.length + ' 筆';
        }
        
        // Load positions
        async function loadPositions() {
            if (!state.connected) return;
            
            try {
                const data = await apiCall('/api/positions', {
                    api_key: state.apiKey,
                    secret_key: state.secretKey
                });
                
                state.activePositions = data.active || [];
                state.settledPositions = data.settled || [];
                state.spotUsdt = data.spot_usdt || 0;
                state.spotEth = data.spot_eth || 0;
                state.dualTotal = data.dual_total || 0;
                state.dualPositions = (data.dual_investment && data.dual_investment.positions) || [];
                state.ethPrice = data.eth_price || 0;
                
                state.fcnTotalValue = state.activePositions.reduce((sum, p) => sum + (p.amt || 0), 0);
                
                renderPositions();
                renderDualPositions();
                updateDashboard();
                updateSettlementDate();
                
                showToast('數據已同步');
            } catch (e) {
                console.error('Load positions error:', e);
                showToast('同步失敗', 'error');
            }
        }
        
        // Load history data for both FCN and DCI
        async function loadHistoryData() {
            if (!state.connected) return;
            
            try {
                // Load FCN history
                const fcnData = await apiCall('/api/history', {
                    api_key: state.apiKey,
                    secret_key: state.secretKey,
                    type: 'fcn'
                });
                
                if (fcnData.available_dates) {
                    state.fcnHistory.dates = fcnData.available_dates;
                    state.fcnHistory.data = {};
                    
                    const fcnSelect = document.getElementById('fcnHistoryDate');
                    fcnSelect.innerHTML = '<option value="">選擇結算日期</option>';
                    fcnData.available_dates.forEach(date => {
                        fcnSelect.innerHTML += `<option value="${date}">${date}</option>`;
                    });
                    
                    // Auto-select latest date
                    if (fcnData.available_dates.length > 0) {
                        fcnSelect.value = fcnData.available_dates[0];
                        loadFcnHistory();
                    }
                }
                
                // Load DCI history
                const dciData = await apiCall('/api/history', {
                    api_key: state.apiKey,
                    secret_key: state.secretKey,
                    type: 'dci'
                });
                
                if (dciData.available_dates) {
                    state.dciHistory.dates = dciData.available_dates;
                    state.dciHistory.data = {};
                    
                    const dciSelect = document.getElementById('dciHistoryDate');
                    dciSelect.innerHTML = '<option value="">選擇結算日期</option>';
                    dciData.available_dates.forEach(date => {
                        dciSelect.innerHTML += `<option value="${date}">${date}</option>`;
                    });
                    
                    // Auto-select latest date
                    if (dciData.available_dates.length > 0) {
                        dciSelect.value = dciData.available_dates[0];
                        loadDciHistory();
                    }
                }
            } catch (e) {
                console.error('Load history error:', e);
            }
        }
        
        // Load FCN history for selected date
        async function loadFcnHistory() {
            const date = document.getElementById('fcnHistoryDate').value;
            if (!date) return;
            
            try {
                const data = await apiCall('/api/history', {
                    api_key: state.apiKey,
                    secret_key: state.secretKey,
                    type: 'fcn',
                    settle_date: date
                });
                
                renderFcnHistory(data);
            } catch (e) {
                console.error('Load FCN history error:', e);
            }
        }
        
        // Load DCI history for selected date
        async function loadDciHistory() {
            const date = document.getElementById('dciHistoryDate').value;
            if (!date) return;
            
            try {
                const data = await apiCall('/api/history', {
                    api_key: state.apiKey,
                    secret_key: state.secretKey,
                    type: 'dci',
                    settle_date: date
                });
                
                renderDciHistory(data);
            } catch (e) {
                console.error('Load DCI history error:', e);
            }
        }
        
        // Render FCN history
        function renderFcnHistory(data) {
            const list = document.getElementById('fcnHistoryList');
            const summary = document.getElementById('fcnHistorySummary');
            const settled = data.settled || [];
            
            if (settled.length === 0) {
                list.innerHTML = '<div class="empty-state">無歷史記錄</div>';
                summary.innerHTML = '';
                return;
            }
            
            let totalUsdt = 0;
            let totalEth = 0;
            
            list.innerHTML = settled.map(p => {
                const scenario = p.scenario || '--';
                const usdtReturn = p.usdt_return || 0;
                const ethReturn = p.eth_return || 0;
                
                totalUsdt += usdtReturn;
                totalEth += ethReturn;
                
                const scenarioClass = scenario.toLowerCase();
                const scenarioIcon = scenario === 'KO' ? '✅' : scenario === 'S1' ? '⚠️' : scenario === 'S2' ? '⚡' : '';
                
                return `
                    <div class="history-item-compact">
                        <div class="item-row">
                            <span class="phase">${p.phase}</span>
                            <span class="scenario ${scenarioClass}">${scenarioIcon} ${scenario}</span>
                        </div>
                        <div class="item-row">
                            <span class="amount">$${p.amt.toFixed(0)}</span>
                            <span class="return">${usdtReturn > 0 ? '$' + usdtReturn.toFixed(0) : ethReturn > 0 ? ethReturn.toFixed(4) + ' ETH' : '--'}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            summary.innerHTML = `
                <div class="total">${totalUsdt > 0 ? '$' + totalUsdt.toFixed(0) : totalEth > 0 ? totalEth.toFixed(4) + ' ETH' : '--'}</div>
                <div>該批次返還</div>
            `;
        }
        
        // Render DCI history
        function renderDciHistory(data) {
            const list = document.getElementById('dciHistoryList');
            const summary = document.getElementById('dciHistorySummary');
            const settled = data.settled || [];
            
            if (settled.length === 0) {
                list.innerHTML = '<div class="empty-state">無歷史記錄</div>';
                summary.innerHTML = '';
                return;
            }
            
            let totalUsdt = 0;
            let totalEth = 0;
            
            list.innerHTML = settled.map(p => {
                const scenario = p.scenario || '--';
                const usdtReturn = p.usdt_return || 0;
                const ethReturn = p.eth_return || 0;
                const investCoin = p.invest_coin || 'USDT';
                
                totalUsdt += usdtReturn;
                totalEth += ethReturn;
                
                const scenarioClass = scenario.toLowerCase();
                const scenarioIcon = scenario === 'A' ? '✅' : '⚠️';
                
                return `
                    <div class="history-item-compact">
                        <div class="item-row">
                            <span class="phase">${investCoin}</span>
                            <span class="scenario ${scenarioClass}">${scenarioIcon} ${scenario}</span>
                        </div>
                        <div class="item-row">
                            <span class="amount">${p.invest_amount.toFixed(4)} ${investCoin}</span>
                            <span class="return">${usdtReturn > 0 ? '$' + usdtReturn.toFixed(0) : ethReturn > 0 ? ethReturn.toFixed(4) + ' ETH' : '--'}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            summary.innerHTML = `
                <div class="total">${totalUsdt > 0 ? '$' + totalUsdt.toFixed(0) : totalEth > 0 ? totalEth.toFixed(4) + ' ETH' : '--'}</div>
                <div>該批次返還</div>
            `;
        }
        
        // Sync data
        async function syncData() {
            const btn = document.getElementById('syncBtn');
            btn.disabled = true;
            btn.textContent = 'Syncing...';
            await loadPositions();
            await loadHistoryData();
            btn.disabled = false;
            btn.textContent = '↓ SYNC';
        }
        
        // Update settlement date
        function updateSettlementDate() {
            if (state.activePositions.length === 0) return;
            const earliest = state.activePositions.reduce((min, p) => p.settle_ts < min.settle_ts ? p : min, state.activePositions[0]);
            document.getElementById('settleDate').value = earliest.settle_date || '--';
        }
        
        // Render positions
        function renderPositions() {
            const container = document.getElementById('positionsList');
            document.getElementById('activeCount').textContent = state.activePositions.length;
            
            if (state.activePositions.length === 0) {
                container.innerHTML = '<div class="empty-state">No active positions</div>';
                return;
            }
            
            container.innerHTML = state.activePositions.map(p => `
                <div class="position-item">
                    <div class="position-header">
                        <span class="position-phase">${p.phase}</span>
                        <span class="position-amt">$${p.amt.toFixed(2)}</span>
                    </div>
                    <div class="position-details">
                        Strike: $${p.strike.toFixed(2)} | KO: $${p.ko.toFixed(2)} | APR: ${p.apr.toFixed(2)}% | ${p.dur}d
                    </div>
                </div>
            `).join('');
        }
        
        // Render dual positions
        function renderDualPositions() {
            const container = document.getElementById('dualList');
            document.getElementById('dualCount').textContent = state.dualPositions.length;
            
            if (state.dualPositions.length === 0) {
                container.innerHTML = '<div class="empty-state">No active positions</div>';
                return;
            }
            
            container.innerHTML = state.dualPositions.map(p => `
                <div class="position-item">
                    <div class="position-header">
                        <span class="position-phase">${p.invest_coin}</span>
                        <span class="position-amt">$${p.value_usd.toFixed(2)}</span>
                    </div>
                    <div class="position-details">
                        ${p.invest_amount.toFixed(4)} ${p.invest_coin} | Strike: $${p.strike_price.toFixed(2)} | APR: ${p.apr.toFixed(2)}%
                    </div>
                </div>
            `).join('');
        }
        
        // Calculate settlement
        async function calculateSettlement() {
            const settlePrice = parseFloat(document.getElementById('settlePrice').value);
            
            if (!settlePrice || settlePrice <= 0) {
                showToast('請輸入有效的結算價格', 'error');
                return;
            }
            
            if (state.activePositions.length === 0) {
                showToast('沒有活躍倉位', 'error');
                return;
            }
            
            try {
                const data = await apiCall('/api/calculate', {
                    api_key: state.apiKey,
                    secret_key: state.secretKey,
                    batch: state.activePositions.map(p => ({
                        pid: p.pid,
                        phase: p.phase,
                        amt: p.amt,
                        strike: p.strike,
                        ko: p.ko,
                        apr: p.apr,
                        dur: p.dur
                    })),
                    settle_price: settlePrice
                });
                
                renderCalcResults(data);
                showToast('計算完成');
            } catch (e) {
                console.error('Calculate error:', e);
                showToast('計算失敗', 'error');
            }
        }
        
        // Render calculation results
        function renderCalcResults(data) {
            const container = document.getElementById('calcResults');
            const grid = document.getElementById('resultsGrid');
            
            if (!data.results || data.results.length === 0) {
                return;
            }
            
            const summary = data.summary;
            
            grid.innerHTML = `
                <div class="result-item">
                    <div class="label">總再投資</div>
                    <div class="value">$${summary.total_reinvest.toFixed(2)}</div>
                </div>
                <div class="result-item">
                    <div class="label">需補充</div>
                    <div class="value">$${summary.total_topup.toFixed(2)}</div>
                </div>
                <div class="result-item">
                    <div class="label">下期總額</div>
                    <div class="value">$${summary.total_next.toFixed(2)}</div>
                </div>
                <div class="result-item">
                    <div class="label">獲得 ETH</div>
                    <div class="value">${summary.total_eth.toFixed(6)}</div>
                </div>
            `;
            
            container.classList.remove('hidden');
        }
        
        // Auto-refresh ETH price every 60s
        setInterval(async () => {
            if (!state.connected) return;
            try {
                const res = await fetch('/api/eth-price');
                const data = await res.json();
                if (data.price > 0) {
                    state.ethPrice = data.price;
                    updateDashboard();
                }
            } catch (e) {
                console.error('ETH price refresh error:', e);
            }
        }, 60000);
    </script>
</body>
</html>
