<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCN Terminal v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04080f;
            --bg2: #070d18;
            --sur: #0a1220;
            --sur2: #0d1a2e;
            --brd: #0e2040;
            --brd2: #1a3560;
            --acc: #00d9ff;
            --acc2: #00ff88;
            --bull: #00ff88;
            --bear: #ff2d55;
            --range: #ffb800;
            --txt: #e0f0ff;
            --txt2: #8a9bb0;
            --shadow: 0 0 20px rgba(0, 217, 255, 0.15);
            --glow: 0 0 30px rgba(0, 217, 255, 0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Exo 2', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--txt);
            min-height: 100vh;
            padding: 16px;
            line-height: 1.6;
        }
        
        .container { max-width: 480px; margin: 0 auto; }
        
        /* Header */
        .header {
            text-align: center;
            padding: 24px 0 16px;
        }
        
        .header-icon {
            width: 12px;
            height: 12px;
            border: 2px solid var(--acc);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--acc);
        }
        
        .header h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.3em;
            letter-spacing: 4px;
            color: var(--acc);
            font-weight: 400;
            display: inline-flex;
            align-items: center;
        }
        
        .header .subtitle {
            color: var(--txt2);
            font-size: 0.75em;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        
        /* Cards */
        .card {
            background: var(--sur);
            border: 1px solid var(--brd);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        
        .card-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--brd);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        
        .card-header h3 {
            font-size: 0.75em;
            color: var(--txt2);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }
        
        .card-body {
            padding: 16px;
        }
        
        /* LIVE Indicator */
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7em;
            color: var(--acc2);
            letter-spacing: 2px;
        }
        
        .live-dot {
            width: 6px;
            height: 6px;
            background: var(--acc2);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--acc2);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        /* Status Button */
        .status-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 600;
            border: 1px solid;
        }
        
        .status-btn.offline {
            background: rgba(255, 45, 85, 0.1);
            color: var(--bear);
            border-color: var(--bear);
        }
        
        .status-btn.online {
            background: rgba(0, 255, 136, 0.1);
            color: var(--bull);
            border-color: var(--bull);
        }
        
        /* ETH Price Bar */
        .eth-price-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--brd);
            margin-bottom: 16px;
        }
        
        .eth-label {
            font-size: 0.7em;
            color: var(--txt2);
            letter-spacing: 1px;
        }
        
        .eth-value {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.6em;
            color: var(--acc2);
            font-weight: 600;
        }
        
        /* Total Investment */
        .total-investment {
            text-align: center;
            padding: 16px 0;
            margin-bottom: 16px;
        }
        
        .total-label {
            font-size: 0.7em;
            color: var(--txt2);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .total-amount {
            font-family: 'Share Tech Mono', monospace;
            font-size: 2em;
            color: var(--acc);
            margin-top: 4px;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }
        
        /* Categories Grid */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .category-item {
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: 8px;
            padding: 12px 8px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .category-item:hover {
            border-color: var(--brd2);
            background: var(--sur2);
        }
        
        .category-item[data-category="spot"] {
            border-top: 2px solid var(--acc);
        }
        
        .category-item[data-category="fcn"] {
            border-top: 2px solid var(--bull);
        }
        
        .category-item[data-category="dci"] {
            border-top: 2px solid var(--range);
        }
        
        .cat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .cat-name {
            font-size: 0.75em;
            color: var(--txt);
            font-weight: 600;
        }
        
        .cat-percent {
            font-size: 0.65em;
            color: var(--txt2);
            background: var(--sur);
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .cat-amount {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1em;
            color: var(--acc2);
            margin-bottom: 4px;
        }
        
        .cat-detail {
            font-size: 0.65em;
            color: var(--txt2);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        /* Primary Button */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--acc), var(--acc2));
            border: none;
            border-radius: 8px;
            color: var(--bg);
            font-size: 0.85em;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .btn-primary:hover {
            box-shadow: var(--glow);
            transform: translateY(-1px);
        }
        
        .btn-primary:disabled {
            background: var(--brd);
            color: var(--txt2);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* Connection Panel */
        .conn-panel .card-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .input-row {
            display: flex;
            gap: 8px;
        }
        
        .input-row input {
            flex: 1;
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--txt);
            font-size: 0.8em;
        }
        
        .input-row input::placeholder {
            color: var(--txt2);
        }
        
        .input-row input:focus {
            outline: none;
            border-color: var(--acc);
        }
        
        .conn-status {
            font-size: 0.75em;
            color: var(--txt2);
            text-align: center;
        }
        
        /* Sync Button */
        .sync-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--brd2);
            color: var(--txt);
            border-radius: 8px;
            font-size: 0.8em;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .sync-btn:hover {
            background: var(--brd);
            border-color: var(--acc);
            color: var(--acc);
        }
        
        .sync-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Section Title */
        .section-title {
            font-size: 0.75em;
            color: var(--acc);
            letter-spacing: 2px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title::before {
            content: '//';
            color: var(--txt2);
        }
        
        /* Positions List */
        .position-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--brd);
        }
        
        .position-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        
        .position-phase {
            font-family: 'Share Tech Mono', monospace;
            color: var(--acc);
            font-size: 0.9em;
        }
        
        .position-amt {
            font-family: 'Share Tech Mono', monospace;
            color: var(--txt);
        }
        
        .position-details {
            font-size: 0.75em;
            color: var(--txt2);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 32px;
            color: var(--txt2);
            font-size: 0.85em;
        }
        
        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 32px;
            color: var(--acc);
            font-size: 0.85em;
        }
        
        .loading-state::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--brd);
            border-top-color: var(--acc);
            border-radius: 50%;
            margin-left: 8px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Hidden */
        .hidden { display: none !important; }
        
        /* Badge */
        .badge {
            background: var(--acc);
            color: var(--bg);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 700;
        }
        
        /* Results */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        
        .result-item {
            background: var(--bg2);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .result-item .label {
            font-size: 0.65em;
            color: var(--txt2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .result-item .value {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1em;
            color: var(--acc2);
            margin-top: 4px;
        }
        
        /* History Section - Vertical Layout */
        .history-section {
            margin-bottom: 16px;
        }
        
        .history-section-header {
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 12px;
            text-align: center;
            font-weight: 600;
        }
        
        .history-section.fcn .history-section-header {
            border-top: 2px solid var(--bull);
        }
        
        .history-section.dci .history-section-header {
            border-top: 2px solid var(--range);
        }
        
        .history-date-select {
            width: 100%;
            background: var(--sur);
            border: 1px solid var(--brd);
            border-radius: 8px;
            padding: 12px;
            color: var(--txt);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1em;
            text-align: center;
            margin-bottom: 12px;
        }
        
        .history-date-select:focus {
            outline: none;
            border-color: var(--acc);
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .history-item {
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: 8px;
            padding: 12px;
        }
        
        .history-item .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .history-item .phase {
            font-family: 'Share Tech Mono', monospace;
            color: var(--acc);
            font-size: 1em;
            font-weight: 600;
        }
        
        .history-item .scenario {
            font-size: 0.8em;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        .history-item .scenario.ko, .history-item .scenario.a {
            background: rgba(0, 255, 136, 0.15);
            color: var(--bull);
        }
        
        .history-item .scenario.s1 {
            background: rgba(255, 45, 85, 0.15);
            color: var(--bear);
        }
        
        .history-item .scenario.s2, .history-item .scenario.b {
            background: rgba(255, 184, 0, 0.15);
            color: var(--range);
        }
        
        .history-item .detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            margin-bottom: 4px;
        }
        
        .history-item .detail-label {
            color: var(--txt2);
        }
        
        .history-item .detail-value {
            font-family: 'Share Tech Mono', monospace;
            color: var(--txt);
        }
        
        .history-summary {
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: 8px;
            padding: 16px;
            margin-top: 12px;
            text-align: center;
        }
        
        .history-summary .label {
            font-size: 0.7em;
            color: var(--txt2);
            margin-bottom: 4px;
        }
        
        .history-summary .total {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.3em;
            color: var(--acc2);
            margin-bottom: 4px;
        }
        
        .history-summary .eth-cost {
            font-size: 0.8em;
            color: var(--txt2);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--brd);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--sur);
            border: 1px solid var(--brd);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.85em;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .toast.success {
            border-color: var(--bull);
            color: var(--bull);
        }
        
        .toast.error {
            border-color: var(--bear);
            color: var(--bear);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><span class="header-icon"></span>FCN TERMINAL V3.0</h1>
            <div class="subtitle">幣安結構性產品投資組合管理</div>
        </div>
        
        <!-- Connection Panel -->
        <div class="card conn-panel" id="connPanel">
            <div class="card-body">
                <div class="input-row">
                    <input type="text" id="apiKey" placeholder="API Key" autocomplete="off">
                </div>
                <div class="input-row">
                    <input type="password" id="secretKey" placeholder="Secret Key" autocomplete="off">
                </div>
                <button class="btn-primary" id="connectBtn" onclick="connect()">Connect</button>
                <div class="conn-status" id="connStatus">Not connected</div>
            </div>
        </div>
        
        <!-- Live Dashboard -->
        <div class="card hidden" id="dashboardCard">
            <div class="card-header">
                <div class="live-indicator">
                    <span class="live-dot"></span>
                    LIVE
                </div>
                <span class="status-btn offline" id="connStatusBtn">斷線</span>
            </div>
            <div class="card-body">
                <!-- ETH Price -->
                <div class="eth-price-bar">
                    <span class="eth-label">ETH/USDT</span>
                    <span class="eth-value" id="liveEthPrice">--</span>
                </div>
                
                <!-- Total Investment -->
                <div class="total-investment">
                    <div class="total-label">總投資金額</div>
                    <div class="total-amount" id="liveTotal">--</div>
                </div>
                
                <!-- Three Categories -->
                <div class="categories-grid">
                    <div class="category-item" data-category="spot">
                        <div class="cat-header">
                            <span class="cat-name">現貨</span>
                            <span class="cat-percent" id="spotPercent">--</span>
                        </div>
                        <div class="cat-amount" id="spotValue">--</div>
                        <div class="cat-detail">
                            <span id="spotUsdt">USDT: --</span>
                            <span id="spotEth">ETH: --</span>
                        </div>
                    </div>
                    
                    <div class="category-item" data-category="fcn">
                        <div class="cat-header">
                            <span class="cat-name">折價買幣</span>
                            <span class="cat-percent" id="fcnPercent">--</span>
                        </div>
                        <div class="cat-amount" id="fcnValue">--</div>
                        <div class="cat-detail">
                            <span id="fcnCount">-- 筆</span>
                        </div>
                    </div>
                    
                    <div class="category-item" data-category="dci">
                        <div class="cat-header">
                            <span class="cat-name">高價賣出</span>
                            <span class="cat-percent" id="dciPercent">--</span>
                        </div>
                        <div class="cat-amount" id="dciValue">--</div>
                        <div class="cat-detail">
                            <span id="dciCount">-- 筆</span>
                        </div>
                    </div>
                </div>
                
                <button class="sync-btn" onclick="syncData()" id="syncBtn">↓ SYNC</button>
            </div>
        </div>
        
        <!-- Positions -->
        <div class="card hidden" id="positionsCard">
            <div class="card-header">
                <h3>FCN 持倉 <span class="badge" id="activeCount">0</span></h3>
            </div>
            <div class="card-body" id="positionsList">
                <div class="empty-state">No active positions</div>
            </div>
        </div>
        
        <!-- Dual Investment -->
        <div class="card hidden" id="dualCard">
            <div class="card-header">
                <h3>雙幣投資 <span class="badge" id="dualCount">0</span></h3>
            </div>
            <div class="card-body" id="dualList">
                <div class="empty-state">No active positions</div>
            </div>
        </div>
        
        <!-- History Section - Vertical Layout -->
        <div class="card hidden" id="historyCard">
            <div class="card-header">
                <h3>歷史持倉 (最近30天)</h3>
            </div>
            <div class="card-body">
                <!-- FCN History -->
                <div class="history-section fcn">
                    <div class="history-section-header">折價買幣</div>
                    <select class="history-date-select" id="fcnHistoryDate" onchange="loadFcnHistory()">
                        <option value="">選擇結算日期</option>
                    </select>
                    <div class="history-list" id="fcnHistoryList">
                        <div class="empty-state">無歷史記錄</div>
                    </div>
                    <div class="history-summary" id="fcnHistorySummary"></div>
                </div>
                
                <!-- DCI History -->
                <div class="history-section dci">
                    <div class="history-section-header">高價賣出 (雙幣理財)</div>
                    <select class="history-date-select" id="dciHistoryDate" onchange="loadDciHistory()">
                        <option value="">選擇結算日期</option>
                    </select>
                    <div class="history-list" id="dciHistoryList">
                        <div class="empty-state">無歷史記錄</div>
                    </div>
                    <div class="history-summary" id="dciHistorySummary"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // State
        let state = {
            connected: false,
            apiKey: '',
            secretKey: '',
            ethPrice: 0,
            spotUsdt: 0,
            spotEth: 0,
            dualTotal: 0,
            dualPositions: [],
            activePositions: [],
            settledPositions: [],
            fcnTotalValue: 0,
            fcnHistory: { dates: [], data: {} },
            dciHistory: { dates: [], data: {} }
        };
        
        // API helper
        async function apiCall(endpoint, data) {
            try {
                console.log('API Call:', endpoint, data);
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (!res.ok) {
                    const text = await res.text();
                    console.error('HTTP Error:', res.status, text);
                    throw new Error(`HTTP ${res.status}: ${text}`);
                }
                
                const json = await res.json();
                console.log('API Response:', endpoint, json);
                return json;
            } catch (e) {
                console.error('API Call failed:', endpoint, e);
                throw e;
            }
        }
        
        // Show toast
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Connect
        async function connect() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const secretKey = document.getElementById('secretKey').value.trim();
            
            if (!apiKey || !secretKey) {
                showToast('請輸入 API Key 和 Secret Key', 'error');
                return;
            }
            
            const btn = document.getElementById('connectBtn');
            btn.disabled = true;
            btn.textContent = 'Connecting...';
            
            try {
                const data = await apiCall('/api/connect', { api_key: apiKey, secret_key: secretKey });
                
                if (data.success) {
                    state.connected = true;
                    state.apiKey = apiKey;
                    state.secretKey = secretKey;
                    state.ethPrice = data.eth_price;
                    state.spotUsdt = data.spot_usdt || 0;
                    state.spotEth = data.spot_eth || 0;
                    state.dualTotal = data.dual_total || 0;
                    
                    showToast('Connected successfully');
                    
                    // Update UI
                    document.getElementById('connPanel').classList.add('hidden');
                    document.getElementById('dashboardCard').classList.remove('hidden');
                    document.getElementById('positionsCard').classList.remove('hidden');
                    document.getElementById('dualCard').classList.remove('hidden');
                    document.getElementById('historyCard').classList.remove('hidden');
                    
                    updateStatus(true);
                    updateDashboard();
                    await loadPositions();
                    await loadHistoryData();
                } else {
                    showToast('Connection failed: ' + (data.error || 'Unknown error'), 'error');
                    btn.disabled = false;
                    btn.textContent = 'Connect';
                }
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Connect';
            }
        }
        
        // Update connection status
        function updateStatus(connected) {
            const btn = document.getElementById('connStatusBtn');
            if (connected) {
                btn.className = 'status-btn online';
                btn.textContent = '已連接';
            } else {
                btn.className = 'status-btn offline';
                btn.textContent = '斷線';
            }
        }
        
        // Update Dashboard
        function updateDashboard() {
            const spotValue = state.spotUsdt + (state.spotEth * state.ethPrice);
            const fcnValue = state.fcnTotalValue;
            const dciValue = state.dualTotal;
            const total = spotValue + fcnValue + dciValue;
            
            document.getElementById('liveEthPrice').textContent = '$' + state.ethPrice.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('liveTotal').textContent = '$' + total.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            
            document.getElementById('spotValue').textContent = '$' + spotValue.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
            document.getElementById('spotPercent').textContent = total > 0 ? ((spotValue / total) * 100).toFixed(1) + '%' : '0%';
            document.getElementById('spotUsdt').textContent = 'USDT: ' + state.spotUsdt.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
            document.getElementById('spotEth').textContent = 'ETH: ' + state.spotEth.toFixed(4);
            
            document.getElementById('fcnValue').textContent = '$' + fcnValue.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
            document.getElementById('fcnPercent').textContent = total > 0 ? ((fcnValue / total) * 100).toFixed(1) + '%' : '0%';
            document.getElementById('fcnCount').textContent = state.activePositions.length + ' 筆';
            
            document.getElementById('dciValue').textContent = '$' + dciValue.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
            document.getElementById('dciPercent').textContent = total > 0 ? ((dciValue / total) * 100).toFixed(1) + '%' : '0%';
            document.getElementById('dciCount').textContent = state.dualPositions.length + ' 筆';
        }
        
        // Load positions
        async function loadPositions() {
            if (!state.connected) return;
            
            try {
                const data = await apiCall('/api/positions', {
                    api_key: state.apiKey,
                    secret_key: state.secretKey
                });
                
                state.activePositions = data.active || [];
                state.settledPositions = data.settled || [];
                state.spotUsdt = data.spot_usdt || 0;
                state.spotEth = data.spot_eth || 0;
                state.dualTotal = data.dual_total || 0;
                state.dualPositions = (data.dual_investment && data.dual_investment.positions) || [];
                state.ethPrice = data.eth_price || 0;
                
                state.fcnTotalValue = state.activePositions.reduce((sum, p) => sum + (p.amt || 0), 0);
                
                renderPositions();
                renderDualPositions();
                updateDashboard();
                
                showToast('數據已同步');
            } catch (e) {
                console.error('Load positions error:', e);
                showToast('同步失敗', 'error');
            }
        }
        
        // Load history data
        async function loadHistoryData() {
            if (!state.connected) return;
            
            try {
                // Load FCN history
                const fcnData = await apiCall('/api/history', {
                    api_key: state.apiKey,
                    secret_key: state.secretKey,
                    type: 'fcn'
                });
                
                if (fcnData.error) {
                    console.error('FCN history error:', fcnData.error);
                } else if (fcnData.available_dates) {
                    state.fcnHistory.dates = fcnData.available_dates;
                    
                    const fcnSelect = document.getElementById('fcnHistoryDate');
                    fcnSelect.innerHTML = '<option value="">選擇結算日期</option>';
                    fcnData.available_dates.forEach(date => {
                        fcnSelect.innerHTML += `<option value="${date}">${date}</option>`;
                    });
                    
                    // Auto-select latest date and load
                    if (fcnData.available_dates.length > 0) {
                        fcnSelect.value = fcnData.available_dates[0];
                        await loadFcnHistory();
                    }
                }
                
                // Load DCI history
                const dciData = await apiCall('/api/history', {
                    api_key: state.apiKey,
                    secret_key: state.secretKey,
                    type: 'dci'
                });
                
                if (dciData.error) {
                    console.error('DCI history error:', dciData.error);
                } else if (dciData.available_dates) {
                    state.dciHistory.dates = dciData.available_dates;
                    
                    const dciSelect = document.getElementById('dciHistoryDate');
                    dciSelect.innerHTML = '<option value="">選擇結算日期</option>';
                    dciData.available_dates.forEach(date => {
                        dciSelect.innerHTML += `<option value="${date}">${date}</option>`;
                    });
                    
                    // Auto-select latest date and load
                    if (dciData.available_dates.length > 0) {
                        dciSelect.value = dciData.available_dates[0];
                        await loadDciHistory();
                    }
                }
            } catch (e) {
                console.error('Load history error:', e);
            }
        }
        
        // Load FCN history
        async function loadFcnHistory() {
            const date = document.getElementById('fcnHistoryDate').value;
            if (!date) {
                document.getElementById('fcnHistoryList').innerHTML = '<div class="empty-state">請選擇日期</div>';
                document.getElementById('fcnHistorySummary').innerHTML = '';
                return;
            }
            
            // Show loading state
            document.getElementById('fcnHistoryList').innerHTML = '<div class="loading-state">載入中</div>';
            document.getElementById('fcnHistorySummary').innerHTML = '';
            
            try {
                console.log('Loading FCN history for date:', date);
                const data = await apiCall('/api/history', {
                    api_key: state.apiKey,
                    secret_key: state.secretKey,
                    type: 'fcn',
                    settle_date: date
                });
                
                console.log('FCN history response:', data);
                
                // Store for recalculation
                window.lastFcnHistoryData = data;
                
                if (data.error) {
                    console.error('API error:', data.error);
                    document.getElementById('fcnHistoryList').innerHTML = `<div class="empty-state">API錯誤: ${data.error}</div>`;
                    document.getElementById('fcnHistorySummary').innerHTML = '';
                    return;
                }
                
                // Check if data has the expected structure
                if (!data.settled) {
                    console.warn('No settled data in response:', data);
                    document.getElementById('fcnHistoryList').innerHTML = '<div class="empty-state">該日期無結算記錄</div>';
                    document.getElementById('fcnHistorySummary').innerHTML = '';
                    return;
                }
                
                renderFcnHistory(data);
            } catch (e) {
                console.error('Load FCN history error:', e);
                document.getElementById('fcnHistoryList').innerHTML = `<div class="empty-state">載入失敗: ${e.message}</div>`;
                document.getElementById('fcnHistorySummary').innerHTML = '';
            }
        }
        
        // Load DCI history
        async function loadDciHistory() {
            const date = document.getElementById('dciHistoryDate').value;
            if (!date) {
                document.getElementById('dciHistoryList').innerHTML = '<div class="empty-state">請選擇日期</div>';
                document.getElementById('dciHistorySummary').innerHTML = '';
                return;
            }
            
            // Show loading state
            document.getElementById('dciHistoryList').innerHTML = '<div class="loading-state">載入中</div>';
            document.getElementById('dciHistorySummary').innerHTML = '';
            
            try {
                const data = await apiCall('/api/history', {
                    api_key: state.apiKey,
                    secret_key: state.secretKey,
                    type: 'dci',
                    settle_date: date
                });
                
                if (data.error) {
                    console.error('API error:', data.error);
                    document.getElementById('dciHistoryList').innerHTML = `<div class="empty-state">${data.error}</div>`;
                    document.getElementById('dciHistorySummary').innerHTML = '';
                    return;
                }
                
                renderDciHistory(data);
            } catch (e) {
                console.error('Load DCI history error:', e);
                document.getElementById('dciHistoryList').innerHTML = '<div class="empty-state">載入失敗，請重試</div>';
                document.getElementById('dciHistorySummary').innerHTML = '';
            }
        }
        
        // Render FCN history
        function renderFcnHistory(data) {
            const list = document.getElementById('fcnHistoryList');
            const summary = document.getElementById('fcnHistorySummary');
            
            if (!data || !data.settled) {
                list.innerHTML = '<div class="empty-state">載入失敗</div>';
                summary.innerHTML = '';
                return;
            }
            
            const settled = data.settled || [];
            
            if (settled.length === 0) {
                // Show debug info if available
                let debugMsg = '無歷史記錄';
                if (data.debug) {
                    debugMsg = `<div style="text-align:left;padding:12px;background:rgba(255,107,107,0.1);border:1px solid #ff6b6b;border-radius:8px;">
                        <div style="color:#ff6b6b;font-weight:bold;margin-bottom:8px;">📊 診斷資訊</div>
                        <div style="font-size:0.9em;color:#ccc;line-height:1.6;">
                            <div>• 活躍持倉: ${data.debug.active_count} 個</div>
                            <div>• 已結算: ${data.debug.settled_count} 個</div>
                            <div>• 可用日期: ${data.debug.available_dates.join(', ') || '無'}</div>
                            <div>• 請求日期: ${data.debug.requested_date || '未指定'}</div>
                            ${data.debug.message ? `<div style="margin-top:8px;color:#ffb800;">💡 ${data.debug.message}</div>` : ''}
                        </div>
                    </div>`;
                }
                list.innerHTML = `<div class="empty-state">${debugMsg}</div>`;
                summary.innerHTML = '';
                return;
            }
            
            // Sort by subscription time for phase ordering
            const sorted = [...settled].sort((a, b) => (a.sub_ts || 0) - (b.sub_ts || 0));
            
            // Check if we need manual settlement price
            const firstPos = sorted[0];
            const hasAutoPrice = firstPos.actual_settle_price > 0;
            const settleDate = firstPos.settle_date || '--';
            
            // Build header with settlement price input
            let headerHtml = '';
            if (!hasAutoPrice) {
                headerHtml = `
                    <div style="margin-bottom:16px;padding:12px;background:rgba(255,184,0,0.1);border:1px solid #ffb800;border-radius:8px;">
                        <div style="color:#ffb800;font-weight:bold;margin-bottom:8px;">⚠️ 無法自動獲取 ${settleDate} 結算價格</div>
                        <div style="display:flex;gap:8px;align-items:center;">
                            <input type="number" id="globalSettlePrice" placeholder="輸入結算價格 (USDT)" 
                                style="flex:1;padding:8px 12px;background:#0a1220;border:1px solid #1a3560;color:#fff;border-radius:6px;font-size:0.9em;">
                            <button onclick="recalculateAllPositions()" 
                                style="padding:8px 16px;background:#00d9ff;color:#000;border:none;border-radius:6px;font-size:0.9em;font-weight:600;cursor:pointer;">
                                計算全部
                            </button>
                        </div>
                    </div>
                `;
            } else {
                headerHtml = `
                    <div style="margin-bottom:16px;padding:12px;background:rgba(0,255,136,0.1);border:1px solid #00ff88;border-radius:8px;">
                        <div style="color:#00ff88;font-weight:bold;">✅ 已獲取結算價格: $${firstPos.actual_settle_price.toFixed(2)}</div>
                    </div>
                `;
            }
            
            let totalUsdt = 0;
            let totalEth = 0;
            let totalInvested = 0;
            
            list.innerHTML = headerHtml + sorted.map((p, idx) => {
                const phase = `P${idx + 1}`;
                const scenario = p.scenario || '--';
                const usdtReturn = p.usdt_return || 0;
                const ethReturn = p.eth_return || 0;
                const amt = p.amt || 0;
                
                totalUsdt += usdtReturn;
                totalEth += ethReturn;
                totalInvested += amt;
                
                const scenarioClass = scenario.toLowerCase();
                const scenarioText = scenario === 'KO' ? 'KO 獲利' : scenario === 'S1' ? 'S1 行權' : scenario === 'S2' ? 'S2 部分' : scenario;
                
                let returnText = '';
                
                if (usdtReturn > 0 && ethReturn > 0) {
                    returnText = `$${usdtReturn.toFixed(0)} + ${ethReturn.toFixed(4)} ETH`;
                } else if (usdtReturn > 0) {
                    returnText = `$${usdtReturn.toFixed(0)} USDT`;
                } else if (ethReturn > 0) {
                    returnText = `${ethReturn.toFixed(4)} ETH`;
                } else {
                    returnText = '--';
                }
                
                return `
                    <div class="history-item">
                        <div class="item-header">
                            <span class="phase">${phase}</span>
                            <span class="scenario ${scenarioClass}">${scenarioText}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">本期投入</span>
                            <span class="detail-value">$${amt.toFixed(0)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">結算日期</span>
                            <span class="detail-value">${p.settle_date || '--'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Strike / KO</span>
                            <span class="detail-value">$${p.strike?.toFixed(0) || '--'} / $${p.ko?.toFixed(0) || '--'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">結算結果</span>
                            <span class="detail-value">${returnText}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Calculate ETH cost
            let ethCostText = '';
            if (totalEth > 0) {
                const ethCost = (totalInvested - totalUsdt) / totalEth;
                ethCostText = `<div class="eth-cost">ETH 持有成本: $${ethCost.toFixed(2)}/ETH</div>`;
            }
            
            let totalText = '';
            if (totalUsdt > 0 && totalEth > 0) {
                totalText = `$${totalUsdt.toFixed(0)} + ${totalEth.toFixed(4)} ETH`;
            } else if (totalUsdt > 0) {
                totalText = `$${totalUsdt.toFixed(0)} USDT`;
            } else if (totalEth > 0) {
                totalText = `${totalEth.toFixed(4)} ETH`;
            } else {
                totalText = '--';
            }
            
            summary.innerHTML = `
                <div class="label">該批次總返還</div>
                <div class="total">${totalText}</div>
                ${ethCostText}
            `;
        }
        
        // Render DCI history
        function renderDciHistory(data) {
            const list = document.getElementById('dciHistoryList');
            const summary = document.getElementById('dciHistorySummary');
            
            if (!data || !data.settled) {
                list.innerHTML = '<div class="empty-state">載入失敗</div>';
                summary.innerHTML = '';
                return;
            }
            
            const settled = data.settled || [];
            
            if (settled.length === 0) {
                list.innerHTML = '<div class="empty-state">無歷史記錄</div>';
                summary.innerHTML = '';
                return;
            }
            
            // Sort by subscription time for phase ordering
            const sorted = [...settled].sort((a, b) => (a.sub_ts || 0) - (b.sub_ts || 0));
            
            let totalUsdt = 0;
            let totalEth = 0;
            
            list.innerHTML = sorted.map((p, idx) => {
                const phase = `P${idx + 1}`;
                const scenario = p.scenario || '--';
                const usdtReturn = p.usdt_return || 0;
                const ethReturn = p.eth_return || 0;
                const investCoin = p.invest_coin || 'USDT';
                const investAmt = p.invest_amount || 0;
                const valueUsd = investCoin === 'ETH' ? investAmt * p.strike : investAmt;
                
                totalUsdt += usdtReturn;
                totalEth += ethReturn;
                
                const scenarioClass = scenario.toLowerCase();
                const scenarioText = scenario === 'A' ? 'A 正常' : 'B 行權';
                
                let returnText = '';
                if (usdtReturn > 0) {
                    returnText = `$${usdtReturn.toFixed(0)} USDT`;
                } else if (ethReturn > 0) {
                    returnText = `${ethReturn.toFixed(4)} ETH`;
                } else {
                    returnText = '--';
                }
                
                return `
                    <div class="history-item">
                        <div class="item-header">
                            <span class="phase">${phase}</span>
                            <span class="scenario ${scenarioClass}">${scenarioText}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">本期投入</span>
                            <span class="detail-value">${investAmt.toFixed(4)} ${investCoin} ($${valueUsd.toFixed(0)})</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Strike</span>
                            <span class="detail-value">$${p.strike?.toFixed(0) || '--'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">結算結果</span>
                            <span class="detail-value">${returnText}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            let totalText = '';
            if (totalUsdt > 0 && totalEth > 0) {
                totalText = `$${totalUsdt.toFixed(0)} + ${totalEth.toFixed(4)} ETH`;
            } else if (totalUsdt > 0) {
                totalText = `$${totalUsdt.toFixed(0)} USDT`;
            } else if (totalEth > 0) {
                totalText = `${totalEth.toFixed(4)} ETH`;
            } else {
                totalText = '--';
            }
            
            summary.innerHTML = `
                <div class="label">該批次總返還</div>
                <div class="total">${totalText}</div>
            `;
        }
        
        // Sync data
        async function syncData() {
            const btn = document.getElementById('syncBtn');
            btn.disabled = true;
            btn.textContent = 'Syncing...';
            await loadPositions();
            await loadHistoryData();
            btn.disabled = false;
            btn.textContent = '↓ SYNC';
        }
        
        // Render positions
        function renderPositions() {
            const container = document.getElementById('positionsList');
            document.getElementById('activeCount').textContent = state.activePositions.length;
            
            if (state.activePositions.length === 0) {
                container.innerHTML = '<div class="empty-state">No active positions</div>';
                return;
            }
            
            container.innerHTML = state.activePositions.map(p => `
                <div class="position-item">
                    <div class="position-header">
                        <span class="position-phase">${p.phase}</span>
                        <span class="position-amt">$${p.amt.toFixed(2)}</span>
                    </div>
                    <div class="position-details">
                        結算日: ${p.settle_date || '--'} | ${p.dur}天
                    </div>
                    <div class="position-details">
                        Strike: $${p.strike.toFixed(2)} | KO: $${p.ko.toFixed(2)} | APR: ${p.apr.toFixed(2)}%
                    </div>
                </div>
            `).join('');
        }
        
        // Render dual positions
        function renderDualPositions() {
            const container = document.getElementById('dualList');
            document.getElementById('dualCount').textContent = state.dualPositions.length;
            
            if (state.dualPositions.length === 0) {
                container.innerHTML = '<div class="empty-state">No active positions</div>';
                return;
            }
            
            container.innerHTML = state.dualPositions.map(p => `
                <div class="position-item">
                    <div class="position-header">
                        <span class="position-phase">${p.invest_coin}</span>
                        <span class="position-amt">$${p.value_usd.toFixed(2)}</span>
                    </div>
                    <div class="position-details">
                        ${p.invest_amount.toFixed(4)} ${p.invest_coin} | Strike: $${p.strike_price.toFixed(2)} | APR: ${p.apr.toFixed(2)}%
                    </div>
                </div>
            `).join('');
        }
        
        // Recalculate all positions with manual settle price
        async function recalculateAllPositions() {
            const inputEl = document.getElementById('globalSettlePrice');
            const settlePrice = parseFloat(inputEl.value);
            
            if (!settlePrice || settlePrice <= 0) {
                alert('請輸入有效的結算價格');
                return;
            }
            
            // Get current data from last API call
            const currentData = window.lastFcnHistoryData;
            if (!currentData || !currentData.settled) {
                alert('無法獲取持倉資料，請先載入歷史記錄');
                return;
            }
            
            // Build batch from all positions
            const batch = currentData.settled.map((p, idx) => ({
                pid: p.pid || `P${idx+1}`,
                phase: `P${idx+1}`,
                amt: p.amt,
                strike: p.strike,
                ko: p.ko,
                apr: p.apr,
                dur: p.dur
            }));
            
            try {
                const res = await fetch('/api/calculate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        api_key: state.apiKey,
                        secret_key: state.secretKey,
                        batch: batch,
                        settle_price: settlePrice
                    })
                });
                
                const data = await res.json();
                if (data.results) {
                    // Update positions with calculated results
                    currentData.settled = currentData.settled.map((p, idx) => {
                        const r = data.results[idx];
                        if (r) {
                            return {
                                ...p,
                                scenario: r.scenario,
                                usdt_return: r.usdt_return,
                                eth_return: r.eth_return,
                                actual_settle_price: settlePrice
                            };
                        }
                        return p;
                    });
                    
                    // Re-render with updated data
                    renderFcnHistory(currentData);
                }
            } catch (e) {
                console.error('Recalculate error:', e);
                alert('計算失敗，請重試');
            }
        }
        
        // Store last FCN history data for recalculation
        window.lastFcnHistoryData = null;

        // Auto-refresh ETH price every 60s
        setInterval(async () => {
            if (!state.connected) return;
            try {
                const res = await fetch('/api/eth-price');
                const data = await res.json();
                if (data.price > 0) {
                    state.ethPrice = data.price;
                    updateDashboard();
                }
            } catch (e) {
                console.error('ETH price refresh error:', e);
            }
        }, 60000);
    </script>
</body>
